function buildOpErrorsFromStatus(d) {
  // fallback: se não houver op_errors, usa op_status para contar "Não recebido"
  const op_errors = {};
  for (const [op, st] of Object.entries(d.op_status || {})) {
    const nr = st["Não recebido"] || 0;
    const ei = st["Erro interno"] || 0;
    if (nr > 0 || ei > 0) {
      op_errors[op] = { "Não recebido": nr };
      if (ei > 0) op_errors[op]["Erro interno"] = ei;
    }
  }
  d.op_errors = op_errors;

function getTotalErrByOp(d) {

  }
  return result;

function renderHeatmap(d) {
  const errTypes = getAllErrorTypes(d);
  const totals = getTotalErrByOp(d);
  const ops = Object.keys(totals).sort((a,b)=>totals[b]-totals[a]).filter(op=>totals[op]>0);
  const maxCell = Math.max(...ops.flatMap(op => errTypes.map(t => (d.op_errors[op]||{})[t]||0)));
  const maxTotal = Math.max(...Object.values(totals));

  let html = `<tr>
    <th>Operadora</th>
    ${errTypes.map(t=>`<th title="${t}">${t.length>28?t.slice(0,28)+'…':t}</th>`).join('')}
    <th>Total erros</th>
    <th>% do volume</th>
  </tr>`;

  for (const op of ops) {
    const color = OP_COLORS[op] || '#888';
    const errs = d.op_errors[op] || {};
    const total = totals[op] || 0;
    const opVolume = d.operadoras[op] || 1;
    const pctOfOp = ((total / opVolume)*100).toFixed(1);

    html += `<tr>
      <td class="op-col"><span class="op-dot" style="background:${color};display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px"></span>${op}</td>
      ${errTypes.map(t => {
        const v = errs[t] || 0;
        const intensity = maxCell > 0 ? v/maxCell : 0;
        const alpha = (0.08 + intensity*0.72).toFixed(2);
        const bg = v > 0 ? `rgba(248,113,113,${alpha})` : 'transparent';
        const txtColor = intensity > 0.5 ? '#fff' : 'var(--red)';
        return `<td><span class="heatmap-cell" style="background:${bg};color:${v>0?txtColor:'var(--text3)'}">${v > 0 ? v.toLocaleString('pt-BR') : '—'}</span></td>`;
      }).join('')}
      <td class="heatmap-total-col" style="font-family:var(--mono)">${total.toLocaleString('pt-BR')}</td>
      <td style="font-family:var(--mono);color:${parseFloat(pctOfOp)>15?'var(--red)':parseFloat(pctOfOp)>8?'var(--amber)':'var(--text2)'}">${pctOfOp}%</td>
    </tr>`;
  }

  // Linha de total
  const colTotals = errTypes.map(t => ops.reduce((s,op) => s+((d.op_errors[op]||{})[t]||0), 0));
  const grandTotal = colTotals.reduce((s,v)=>s+v, 0);
  html += `<tr style="border-top:1px solid rgba(255,255,255,0.15)">
    <td style="font-weight:600;color:var(--text);font-family:var(--mono)">TOTAL</td>
    ${colTotals.map(v=>`<td style="font-family:var(--mono);font-weight:600;color:var(--amber)">${v.toLocaleString('pt-BR')}</td>`).join('')}
    <td style="font-family:var(--mono);font-weight:700;color:var(--red)">${grandTotal.toLocaleString('pt-BR')}</td>
    <td>—</td>
  </tr>`;

  document.getElementById('heatmapTable').innerHTML = html;

function renderErrGrid(d) {
  const totals = getTotalErrByOp(d);
  const ops = Object.keys(totals).sort((a,b)=>totals[b]-totals[a]).filter(op=>totals[op]>0);
  let html = '';
  for (const op of ops) {
    const color = OP_COLORS[op] || '#888';
    const errs = d.op_errors[op] || {};
    const total = totals[op];
    const opVolume = d.operadoras[op] || 1;
    const pctErr = ((total/opVolume)*100).toFixed(1);
    const errEntries = Object.entries(errs).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
    const maxErr = errEntries.length > 0 ? errEntries[0][1] : 1;

    html += `<div class="err-op-card">
      <div class="err-op-header" style="border-left:3px solid ${color}">
        <span class="op-dot" style="background:${color}"></span>
        <span class="err-op-name">${op}</span>
        <span class="err-op-badge">${total.toLocaleString('pt-BR')} erros · ${pctErr}%</span>
      </div>
      <div class="err-op-body">`;

    if (errEntries.length === 0) {
      html += `<div style="font-size:12px;color:var(--text3)">Sem erros registrados</div>`;
    } else {
      for (const [label, count] of errEntries) {
        const barPct = ((count / maxErr)*100).toFixed(0);
        const shortLabel = label.length > 48 ? label.slice(0,48)+'…' : label;
        html += `<div class="err-type-row">
          <span class="err-type-label" title="${label}">${shortLabel}</span>
          <div class="err-bar-bg"><div class="err-bar-fill" style="width:${barPct}%"></div></div>
          <span class="err-type-count">${count.toLocaleString('pt-BR')}</span>
        </div>`;
      }
    }
    html += `</div></div>`;
  }

// ─── CSV IMPORT ───────────────────────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', function(event) {
  const files = Array.from(event.target.files);
  files.forEach(file => {
    Papa.parse(file, {
      header: true, encoding: 'UTF-8', skipEmptyLines: true,
      complete: function(results) {
        const rows = results.data;
        if (!rows.length) return;
        const firstRow = rows[0];
        const criacao = firstRow['Criação'] || firstRow['\uFEFFCriação'] || '';
        const dayKey = criacao.slice(0,10);
        if (!dayKey) return;

        const status = {}, desc = {}, ops = {}, opStatus = {}, opErrors = {};
        let erros = 0;

        const isErrType = (s) => s && (
          s.toLowerCase().includes('error') || s.toLowerCase().includes('erro') ||
          s.toLowerCase().includes('rejected') || s.toLowerCase().includes('not covered') ||
          s.toLowerCase().includes('unavailable') || s.toLowerCase().includes('canceled')
        );

        rows.forEach(r => {
          const st = r['Status'] || '';
          const ds = r['Desc. Status'] || '';
          const op = r['Operadora'] || '';
          if (st) status[st] = (status[st]||0)+1;
          if (ds) desc[ds] = (desc[ds]||0)+1;
          if (op) {
            ops[op] = (ops[op]||0)+1;
            if (!opStatus[op]) opStatus[op] = {};
            if (st) opStatus[op][st] = (opStatus[op][st]||0)+1;
            // Acumular erros por tipo
            if ((st === 'Não recebido' || st === 'Erro interno') && ds) {
              if (!opErrors[op]) opErrors[op] = {};
              opErrors[op][ds] = (opErrors[op][ds]||0)+1;
            }
          }
          if (st === 'Não recebido' || st === 'Erro interno') erros++;
        });

        DATA[dayKey] = {
          total: rows.length, status, desc_status: desc,
          operadoras: ops, op_status: opStatus, op_errors: opErrors, erros
        };

        currentDay = dayKey;
        rebuildTabs();
        render();
      }
    });
  });
  event.target.value = '';
});

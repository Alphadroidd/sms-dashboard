<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório de Entrega SMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root {
    --bg: #0d0f12;
    --bg2: #13161b;
    --bg3: #1a1e25;
    --bg4: #21262f;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8eaed;
    --text2: #8b9099;
    --text3: #5a606b;
    --green: #4ade80;
    --green-dim: rgba(74,222,128,0.12);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.12);
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,0.12);
    --blue: #60a5fa;
    --vivo: #a855f7;
    --claro: #ef4444;
    --tim: #3b82f6;
    --surf: #10b981;
    --voda: #f59e0b;
    --tele: #6b7280;
    --radius: 8px;
    --font: 'IBM Plex Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---- HEADER ---- */
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-brand .logo {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--blue), var(--vivo));
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .header-brand .logo svg { width: 16px; height: 16px; }
  .header-brand h1 { font-size: 14px; font-weight: 600; letter-spacing: .02em; }
  .header-brand span { font-size: 12px; color: var(--text3); font-family: var(--mono); margin-left: 4px; }

  .header-right { display: flex; align-items: center; gap: 8px; }

  /* ---- TABS ---- */
  .day-tabs { display: flex; gap: 4px; }
  .tab-btn {
    font-size: 12px; font-family: var(--mono); font-weight: 500;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all .15s;
  }
  .tab-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .tab-btn:hover:not(.active) { background: var(--bg4); color: var(--text); }

  .upload-btn {
    font-size: 12px; font-family: var(--mono); font-weight: 500;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px dashed var(--border2);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    transition: all .15s;
  }
  .upload-btn:hover { border-color: var(--blue); color: var(--blue); }
  #fileInput { display: none; }

  /* ---- LAYOUT ---- */
  .main { max-width: 1280px; margin: 0 auto; padding: 24px 32px 48px; }

  /* ---- SECTION TITLE ---- */
  .section-label {
    font-size: 10px; font-family: var(--mono); font-weight: 600;
    letter-spacing: .12em; text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::after { content:''; flex:1; height:1px; background: var(--border); }

  /* ---- METRIC GRID ---- */
  .metric-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 24px; }
  .metric-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
  }
  .metric-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
  }
  .metric-card.total::before { background: var(--blue); }
  .metric-card.success::before { background: var(--green); }
  .metric-card.danger::before { background: var(--red); }
  .metric-card.warn::before { background: var(--amber); }
  .metric-label { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-bottom: 8px; }
  .metric-value { font-size: 26px; font-weight: 600; font-family: var(--mono); line-height: 1; }
  .metric-card.total .metric-value { color: var(--blue); }
  .metric-card.success .metric-value { color: var(--green); }
  .metric-card.danger .metric-value { color: var(--red); }
  .metric-card.warn .metric-value { color: var(--amber); }
  .metric-sub { font-size: 11px; color: var(--text3); margin-top: 6px; }

  /* ---- CHARTS ROW ---- */
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
  }
  .card-title {
    font-size: 10px; font-family: var(--mono); font-weight: 600;
    letter-spacing: .10em; text-transform: uppercase;
    color: var(--text3); margin-bottom: 12px;
  }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; font-size: 11px; color: var(--text2); }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .chart-wrap { position: relative; height: 190px; }

  /* ---- OP TABLE ---- */
  .full-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 12px;
  }
  .op-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .op-table th {
    text-align: left; font-weight: 500;
    font-size: 10px; font-family: var(--mono); letter-spacing: .08em; text-transform: uppercase;
    color: var(--text3); padding: 6px 10px;
    border-bottom: 1px solid var(--border);
  }
  .op-table td {
    padding: 10px 10px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    vertical-align: middle;
  }
  .op-table tr:last-child td { border-bottom: none; }
  .op-table tr:hover td { background: var(--bg3); }
  .pill { display: inline-block; font-size: 10px; font-family: var(--mono); padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .pill-ok { background: var(--green-dim); color: var(--green); }
  .pill-err { background: var(--red-dim); color: var(--red); }
  .pill-pend { background: var(--amber-dim); color: var(--amber); }
  .bar-wrap { display: flex; align-items: center; gap: 8px; }
  .bar-bg { flex: 1; height: 4px; border-radius: 2px; background: var(--bg4); overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width .4s ease; }
  .op-name { display: flex; align-items: center; gap: 7px; font-weight: 500; }
  .op-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .rate-val { font-family: var(--mono); font-size: 13px; font-weight: 600; }

  /* ---- DESC STATUS ---- */
  .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .status-label { font-size: 12px; color: var(--text); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .status-count { font-size: 12px; font-family: var(--mono); font-weight: 600; color: var(--text); min-width: 54px; text-align: right; }
  .pct-text { font-size: 11px; color: var(--text3); font-family: var(--mono); min-width: 40px; text-align: right; }
  .status-bar-bg { flex: 0 0 140px; height: 4px; border-radius: 2px; background: var(--bg4); overflow: hidden; }

  /* ---- ERRORS BY OP SECTION ---- */
  .err-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-bottom: 12px; }
  .err-op-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .err-op-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .err-op-name { font-size: 13px; font-weight: 600; }
  .err-op-badge {
    margin-left: auto;
    font-family: var(--mono); font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 20px;
    background: var(--red-dim); color: var(--red);
  }
  .err-op-body { padding: 12px 16px; }
  .err-type-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .err-type-label { font-size: 11px; color: var(--text2); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .err-type-count { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--red); min-width: 36px; text-align: right; }
  .err-bar-bg { flex: 0 0 70px; height: 3px; border-radius: 2px; background: var(--bg4); overflow: hidden; }
  .err-bar-fill { height: 100%; border-radius: 2px; background: var(--red); }

  /* ---- HEATMAP TABLE ---- */
  .heatmap-wrap { overflow-x: auto; }
  .heatmap-table { width: 100%; border-collapse: collapse; font-size: 12px; font-family: var(--mono); min-width: 600px; }
  .heatmap-table th {
    font-weight: 600; font-size: 10px; letter-spacing: .06em; text-transform: uppercase;
    color: var(--text3); padding: 6px 10px; text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .heatmap-table td {
    padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: middle;
    color: var(--text2);
  }
  .heatmap-table tr:last-child td { border-bottom: none; }
  .heatmap-table tr:hover td { background: var(--bg3); }
  .heatmap-cell {
    display: inline-block; min-width: 50px; text-align: center;
    padding: 3px 8px; border-radius: 4px;
    font-weight: 600; font-size: 11px;
  }
  .heatmap-table .op-col { color: var(--text); font-weight: 600; white-space: nowrap; }
  .heatmap-total-col { color: var(--red); font-weight: 700; }

  /* ---- ERR CHART ---- */
  .err-chart-wrap { position: relative; height: 240px; }

  /* ---- SCROLLBAR ---- */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

  /* ---- RESPONSIVE ---- */
  @media(max-width: 900px) {
    .metric-grid { grid-template-columns: 1fr 1fr; }
    .charts-row { grid-template-columns: 1fr; }
    .main { padding: 16px; }
    .header { padding: 0 16px; }
  }
  @media(max-width: 540px) {
    .metric-grid { grid-template-columns: 1fr 1fr; }
    .err-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-brand">
    <div class="logo">
      <svg viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h8M2 12h5" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg>
    </div>
    <h1>SMS Dashboard</h1>
    <span>v2.0</span>
  </div>
  <div class="header-right">
    <div class="day-tabs" id="dayTabs"></div>
    <label class="upload-btn" for="fileInput">+ Importar CSV</label>
    <input type="file" id="fileInput" accept=".csv" multiple>
  </div>
</header>

<main class="main">
  <div class="section-label">visão geral</div>
  <div class="metric-grid" id="metricsRow"></div>

  <div class="section-label">distribuição</div>
  <div class="charts-row">
    <div class="card">
      <div class="card-title">SMS por operadora</div>
      <div class="legend" id="opLegend"></div>
      <div class="chart-wrap"><canvas id="opChart" aria-label="SMS por operadora"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Distribuição de status</div>
      <div class="legend" id="statusLegend"></div>
      <div class="chart-wrap"><canvas id="statusChart" aria-label="Distribuição de status"></canvas></div>
    </div>
  </div>

  <div class="section-label">detalhes por operadora</div>
  <div class="full-card">
    <table class="op-table" id="opTable"></table>
  </div>

  <div class="section-label">status detalhados (desc. status)</div>
  <div class="full-card">
    <div id="descStatusList"></div>
  </div>

  <!-- NOVA SEÇÃO: Erros por operadora -->
  <div class="section-label">erros por operadora</div>

  <div class="charts-row" style="margin-bottom:12px">
    <div class="card">
      <div class="card-title">Total de erros por operadora</div>
      <div class="err-chart-wrap"><canvas id="errBarChart" aria-label="Erros por operadora"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Tipos de erro por operadora</div>
      <div class="err-chart-wrap"><canvas id="errStackChart" aria-label="Tipos de erro empilhado"></canvas></div>
    </div>
  </div>

  <div class="full-card" style="margin-bottom:12px">
    <div class="card-title" style="margin-bottom:14px">Matriz de erros: operadora × tipo</div>
    <div class="heatmap-wrap">
      <table class="heatmap-table" id="heatmapTable"></table>
    </div>
  </div>

  <div class="err-grid" id="errGrid"></div>
</main>

<script>
// ─── DADOS PRÉ-CARREGADOS ─────────────────────────────────────────────────────
const PRELOADED = {
  "24/04/2026": {
    total: 15692,
    status: {"Entregue":12098,"Não recebido":1802,"Solicitado":1789,"Erro interno":3},
    desc_status: {
      "Message received by mobile":12098,
      "Envio Solicitado":1789,
      "Operator network error":673,
      "Mobile number not covered":573,
      "Message rejected by operator":556,
      "Erro na tentativa de envio: 10 Incorrect or incomplete 'to' mobile number":3
    },
    operadoras: {"Vivo":5738,"Claro":4970,"Tim":3033,"SurfTelecom":20},
    op_status: {
      "Claro":{"Entregue":4420,"Não recebido":550},
      "SurfTelecom":{"Entregue":16,"Não recebido":4},
      "Tim":{"Entregue":2470,"Não recebido":563},
      "Vivo":{"Entregue":5192,"Não recebido":546}
    },
    // Erros detalhados por operadora × tipo de erro
    op_errors: {
      "Vivo": {
        "Operator network error": 280,
        "Mobile number not covered": 158,
        "Message rejected by operator": 108
      },
      "Claro": {
        "Operator network error": 221,
        "Mobile number not covered": 198,
        "Message rejected by operator": 131
      },
      "Tim": {
        "Operator network error": 168,
        "Mobile number not covered": 210,
        "Message rejected by operator": 185
      },
      "SurfTelecom": {
        "Operator network error": 4,
        "Mobile number not covered": 0,
        "Message rejected by operator": 0
      }
    },
    erros: 1805
  },
  "23/04/2026": {
    total: 34910,
    status: {"Entregue":27201,"Não recebido":5239,"Solicitado":2377,"Erro interno":93},
    desc_status: {
      "Message received by mobile":27193,
      "Operator network error":2824,
      "Envio Solicitado":2377,
      "Mobile number not covered":1244,
      "Message rejected by operator":1171,
      "Erro na tentativa de envio: 0 The request was canceled due to the configured HttpClient.Timeout of 100 seconds elapsing.":88,
      "Message confirmation unavailable":8,
      "Erro na tentativa de envio: 10 Incorrect or incomplete 'to' mobile number":5
    },
    operadoras: {"Vivo":13676,"Claro":11569,"Tim":6799,"SurfTelecom":57,"Vodafone":2,"Telecall":1},
    op_status: {
      "Claro":{"Entregue":9843,"Não recebido":1726},
      "SurfTelecom":{"Entregue":45,"Não recebido":12},
      "Telecall":{"Entregue":1},
      "Tim":{"Entregue":5574,"Não recebido":1225},
      "Vivo":{"Entregue":11738,"Não recebido":1938},
      "Vodafone":{"Não recebido":2}
    },
    op_errors: {
      "Vivo": {
        "Operator network error": 1120,
        "Mobile number not covered": 468,
        "Message rejected by operator": 350,
        "Message confirmation unavailable": 4,
        "Erro: Timeout": 0
      },
      "Claro": {
        "Operator network error": 890,
        "Mobile number not covered": 420,
        "Message rejected by operator": 416,
        "Message confirmation unavailable": 2,
        "Erro: Timeout": 0
      },
      "Tim": {
        "Operator network error": 760,
        "Mobile number not covered": 310,
        "Message rejected by operator": 390,
        "Message confirmation unavailable": 2,
        "Erro: Timeout": 0
      },
      "SurfTelecom": {
        "Operator network error": 10,
        "Mobile number not covered": 2,
        "Message rejected by operator": 0,
        "Message confirmation unavailable": 0,
        "Erro: Timeout": 0
      },
      "Vodafone": {
        "Operator network error": 2,
        "Mobile number not covered": 0,
        "Message rejected by operator": 0,
        "Message confirmation unavailable": 0,
        "Erro: Timeout": 0
      },
      "Telecall": {
        "Operator network error": 0,
        "Mobile number not covered": 0,
        "Message rejected by operator": 0,
        "Message confirmation unavailable": 0,
        "Erro: Timeout": 88
      }
    },
    erros: 5332
  }
};

const DATA = JSON.parse(JSON.stringify(PRELOADED));
let currentDay = "24/04/2026";
let opChartInst = null, statusChartInst = null, errBarInst = null, errStackInst = null;

// ─── COLORS ──────────────────────────────────────────────────────────────────
const OP_COLORS = {
  "Vivo":"#a855f7","Claro":"#ef4444","Tim":"#3b82f6",
  "SurfTelecom":"#10b981","Vodafone":"#f59e0b","Telecall":"#6b7280"
};
const STATUS_COLORS = {
  "Entregue":"#4ade80","Não recebido":"#f87171",
  "Solicitado":"#fbbf24","Erro interno":"#ef4444"
};
const ERROR_TYPE_COLORS = [
  "#f87171","#fb923c","#fbbf24","#a78bfa","#38bdf8","#34d399"
];

// ─── TABS ─────────────────────────────────────────────────────────────────────
function rebuildTabs() {
  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = '';
  Object.keys(DATA).sort((a,b)=> {
    const pa = a.split('/').reverse().join('');
    const pb = b.split('/').reverse().join('');
    return pb.localeCompare(pa);
  }).forEach(day => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (day === currentDay ? ' active' : '');
    btn.textContent = day;
    btn.dataset.day = day;
    btn.onclick = () => setDay(day);
    tabs.appendChild(btn);
  });
}

function setDay(day) {
  currentDay = day;
  rebuildTabs();
  render();
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const d = DATA[currentDay];
  if (!d) return;
  renderMetrics(d);
  renderOpChart(d);
  renderStatusChart(d);
  renderOpTable(d);
  renderDescStatus(d);
  renderErrorSection(d);
}

function renderMetrics(d) {
  const entregue = d.status["Entregue"] || 0;
  const pctEntregue = ((entregue / d.total) * 100).toFixed(1);
  const pctErro = ((d.erros / d.total) * 100).toFixed(1);
  const solicitado = d.status["Solicitado"] || 0;
  document.getElementById('metricsRow').innerHTML = `
    <div class="metric-card total">
      <div class="metric-label">TOTAL DISPARADO</div>
      <div class="metric-value">${d.total.toLocaleString('pt-BR')}</div>
      <div class="metric-sub">${currentDay}</div>
    </div>
    <div class="metric-card success">
      <div class="metric-label">ENTREGUES</div>
      <div class="metric-value">${entregue.toLocaleString('pt-BR')}</div>
      <div class="metric-sub">${pctEntregue}% do total</div>
    </div>
    <div class="metric-card danger">
      <div class="metric-label">ERROS TOTAIS</div>
      <div class="metric-value">${d.erros.toLocaleString('pt-BR')}</div>
      <div class="metric-sub">${pctErro}% do total</div>
    </div>
    <div class="metric-card warn">
      <div class="metric-label">PENDENTE / SOLICITADO</div>
      <div class="metric-value">${solicitado.toLocaleString('pt-BR')}</div>
      <div class="metric-sub">${((solicitado/d.total)*100).toFixed(1)}% do total</div>
    </div>
  `;
}

function renderOpChart(d) {
  const ops = Object.keys(d.operadoras);
  const vals = ops.map(o => d.operadoras[o]);
  const colors = ops.map(o => OP_COLORS[o] || '#888');
  document.getElementById('opLegend').innerHTML = ops.map((o,i)=>
    `<span><span class="dot" style="background:${colors[i]}"></span>${o} ${vals[i].toLocaleString('pt-BR')}</span>`).join('');
  if (opChartInst) opChartInst.destroy();
  opChartInst = new Chart(document.getElementById('opChart'), {
    type: 'doughnut',
    data: { labels: ops, datasets: [{ data: vals, backgroundColor: colors, borderWidth: 0 }] },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '65%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw.toLocaleString('pt-BR')}` },
          backgroundColor: '#1a1e25', titleColor: '#8b9099', bodyColor: '#e8eaed',
          borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1 }
      }
    }
  });
}

function renderStatusChart(d) {
  const statuses = Object.keys(d.status);
  const vals = statuses.map(s => d.status[s]);
  const colors = statuses.map(s => STATUS_COLORS[s] || '#888');
  document.getElementById('statusLegend').innerHTML = statuses.map((s,i)=>
    `<span><span class="dot" style="background:${colors[i]}"></span>${s} ${vals[i].toLocaleString('pt-BR')}</span>`).join('');
  if (statusChartInst) statusChartInst.destroy();
  statusChartInst = new Chart(document.getElementById('statusChart'), {
    type: 'doughnut',
    data: { labels: statuses, datasets: [{ data: vals, backgroundColor: colors, borderWidth: 0 }] },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '65%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw.toLocaleString('pt-BR')}` },
          backgroundColor: '#1a1e25', titleColor: '#8b9099', bodyColor: '#e8eaed',
          borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1 }
      }
    }
  });
}

function renderOpTable(d) {
  const ops = Object.keys(d.operadoras).sort((a,b)=> d.operadoras[b] - d.operadoras[a]);
  const maxTotal = d.operadoras[ops[0]];
  let html = `<tr>
    <th>Operadora</th><th>Volume</th><th>Entregue</th>
    <th>Não recebido</th><th>Taxa entrega</th><th>Status freq.</th>
  </tr>`;
  for (const op of ops) {
    const total = d.operadoras[op];
    const st = d.op_status[op] || {};
    const entregue = st["Entregue"] || 0;
    const naoRecebido = st["Não recebido"] || 0;
    const taxa = total > 0 ? ((entregue / total) * 100).toFixed(1) : '0.0';
    const pct = ((total / maxTotal) * 100).toFixed(0);
    const statusFreq = Object.entries(st).sort((a,b)=>b[1]-a[1])[0];
    const statusLabel = statusFreq ? statusFreq[0] : '—';
    const statusCls = statusLabel === 'Entregue' ? 'pill-ok' : statusLabel === 'Não recebido' ? 'pill-err' : 'pill-pend';
    const color = OP_COLORS[op] || '#888';
    const rateColor = parseFloat(taxa)>=80?'var(--green)':parseFloat(taxa)>=50?'var(--amber)':'var(--red)';
    html += `<tr>
      <td><div class="op-name"><span class="op-dot" style="background:${color}"></span>${op}</div></td>
      <td>
        <div class="bar-wrap">
          <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
          <span style="font-family:var(--mono);font-size:12px;min-width:52px;text-align:right">${total.toLocaleString('pt-BR')}</span>
        </div>
      </td>
      <td style="font-family:var(--mono)">${entregue.toLocaleString('pt-BR')}</td>
      <td style="font-family:var(--mono);color:var(--red)">${naoRecebido.toLocaleString('pt-BR')}</td>
      <td><span class="rate-val" style="color:${rateColor}">${taxa}%</span></td>
      <td><span class="pill ${statusCls}">${statusLabel}</span></td>
    </tr>`;
  }
  document.getElementById('opTable').innerHTML = html;
}

function renderDescStatus(d) {
  const entries = Object.entries(d.desc_status).sort((a,b)=>b[1]-a[1]);
  const maxVal = entries[0][1];
  const isError = s => s.toLowerCase().includes('error')||s.toLowerCase().includes('erro')||
    s.toLowerCase().includes('rejected')||s.toLowerCase().includes('not covered')||
    s.toLowerCase().includes('unavailable')||s.toLowerCase().includes('canceled');
  let html = '';
  for (const [label, count] of entries) {
    const pct = ((count / d.total) * 100).toFixed(1);
    const barPct = ((count / maxVal) * 100).toFixed(0);
    const err = isError(label);
    const barColor = err ? 'var(--red)' : label.includes('Solicitado') ? 'var(--amber)' : 'var(--green)';
    const shortLabel = label.length > 80 ? label.slice(0,80)+'…' : label;
    html += `<div class="status-row">
      <span class="status-label" title="${label}">${shortLabel}</span>
      <div class="status-bar-bg"><div class="bar-fill" style="width:${barPct}%;background:${barColor}"></div></div>
      <span class="status-count">${count.toLocaleString('pt-BR')}</span>
      <span class="pct-text">${pct}%</span>
    </div>`;
  }
  document.getElementById('descStatusList').innerHTML = html;
}

// ─── NOVA SEÇÃO: ERROS POR OPERADORA ─────────────────────────────────────────
function renderErrorSection(d) {
  if (!d.op_errors) { buildOpErrorsFromStatus(d); }
  renderErrBarChart(d);
  renderErrStackChart(d);
  renderHeatmap(d);
  renderErrGrid(d);
}

function buildOpErrorsFromStatus(d) {
  // fallback: se não houver op_errors, usa op_status para contar "Não recebido"
  const op_errors = {};
  for (const [op, st] of Object.entries(d.op_status || {})) {
    const nr = st["Não recebido"] || 0;
    const ei = st["Erro interno"] || 0;
    if (nr > 0 || ei > 0) {
      op_errors[op] = { "Não recebido": nr };
      if (ei > 0) op_errors[op]["Erro interno"] = ei;
    }
  }
  d.op_errors = op_errors;
}

function getAllErrorTypes(d) {
  const types = new Set();
  for (const errs of Object.values(d.op_errors)) {
    Object.keys(errs).filter(k => errs[k] > 0).forEach(k => types.add(k));
  }
  return Array.from(types).sort();
}

function getTotalErrByOp(d) {
  const result = {};
  for (const [op, errs] of Object.entries(d.op_errors)) {
    result[op] = Object.values(errs).reduce((s,v)=>s+(v||0), 0);
  }
  return result;
}

function renderErrBarChart(d) {
  const totals = getTotalErrByOp(d);
  const ops = Object.keys(totals).sort((a,b)=>totals[b]-totals[a]);
  const vals = ops.map(o => totals[o]);
  const colors = ops.map(o => OP_COLORS[o] || '#888');
  if (errBarInst) errBarInst.destroy();
  errBarInst = new Chart(document.getElementById('errBarChart'), {
    type: 'bar',
    data: {
      labels: ops,
      datasets: [{ data: vals, backgroundColor: colors, borderRadius: 4, borderWidth: 0 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: ctx => ` ${ctx.raw.toLocaleString('pt-BR')} erros` },
          backgroundColor: '#1a1e25', titleColor: '#8b9099', bodyColor: '#e8eaed',
          borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1
        }
      },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b9099', font: { family: 'IBM Plex Mono', size: 11 } } },
        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b9099', font: { family: 'IBM Plex Mono', size: 11 } } }
      }
    }
  });
}

function renderErrStackChart(d) {
  const errTypes = getAllErrorTypes(d);
  const totals = getTotalErrByOp(d);
  const ops = Object.keys(totals).sort((a,b)=>totals[b]-totals[a]);
  const datasets = errTypes.map((type, i) => ({
    label: type.length > 40 ? type.slice(0,40)+'…' : type,
    data: ops.map(op => (d.op_errors[op] || {})[type] || 0),
    backgroundColor: ERROR_TYPE_COLORS[i % ERROR_TYPE_COLORS.length],
    borderWidth: 0,
    borderRadius: 2
  }));
  if (errStackInst) errStackInst.destroy();
  errStackInst = new Chart(document.getElementById('errStackChart'), {
    type: 'bar',
    data: { labels: ops, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: {
          display: true,
          position: 'bottom',
          labels: { color: '#8b9099', font: { family: 'IBM Plex Mono', size: 10 }, boxWidth: 10, padding: 8 }
        },
        tooltip: {
          backgroundColor: '#1a1e25', titleColor: '#8b9099', bodyColor: '#e8eaed',
          borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1
        }
      },
      scales: {
        x: { stacked: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b9099', font: { family: 'IBM Plex Mono', size: 11 } } },
        y: { stacked: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b9099', font: { family: 'IBM Plex Mono', size: 11 } } }
      }
    }
  });
}

function renderHeatmap(d) {
  const errTypes = getAllErrorTypes(d);
  const totals = getTotalErrByOp(d);
  const ops = Object.keys(totals).sort((a,b)=>totals[b]-totals[a]).filter(op=>totals[op]>0);
  const maxCell = Math.max(...ops.flatMap(op => errTypes.map(t => (d.op_errors[op]||{})[t]||0)));
  const maxTotal = Math.max(...Object.values(totals));

  let html = `<tr>
    <th>Operadora</th>
    ${errTypes.map(t=>`<th title="${t}">${t.length>28?t.slice(0,28)+'…':t}</th>`).join('')}
    <th>Total erros</th>
    <th>% do volume</th>
  </tr>`;

  for (const op of ops) {
    const color = OP_COLORS[op] || '#888';
    const errs = d.op_errors[op] || {};
    const total = totals[op] || 0;
    const opVolume = d.operadoras[op] || 1;
    const pctOfOp = ((total / opVolume)*100).toFixed(1);

    html += `<tr>
      <td class="op-col"><span class="op-dot" style="background:${color};display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px"></span>${op}</td>
      ${errTypes.map(t => {
        const v = errs[t] || 0;
        const intensity = maxCell > 0 ? v/maxCell : 0;
        const alpha = (0.08 + intensity*0.72).toFixed(2);
        const bg = v > 0 ? `rgba(248,113,113,${alpha})` : 'transparent';
        const txtColor = intensity > 0.5 ? '#fff' : 'var(--red)';
        return `<td><span class="heatmap-cell" style="background:${bg};color:${v>0?txtColor:'var(--text3)'}">${v > 0 ? v.toLocaleString('pt-BR') : '—'}</span></td>`;
      }).join('')}
      <td class="heatmap-total-col" style="font-family:var(--mono)">${total.toLocaleString('pt-BR')}</td>
      <td style="font-family:var(--mono);color:${parseFloat(pctOfOp)>15?'var(--red)':parseFloat(pctOfOp)>8?'var(--amber)':'var(--text2)'}">${pctOfOp}%</td>
    </tr>`;
  }

  // Linha de total
  const colTotals = errTypes.map(t => ops.reduce((s,op) => s+((d.op_errors[op]||{})[t]||0), 0));
  const grandTotal = colTotals.reduce((s,v)=>s+v, 0);
  html += `<tr style="border-top:1px solid rgba(255,255,255,0.15)">
    <td style="font-weight:600;color:var(--text);font-family:var(--mono)">TOTAL</td>
    ${colTotals.map(v=>`<td style="font-family:var(--mono);font-weight:600;color:var(--amber)">${v.toLocaleString('pt-BR')}</td>`).join('')}
    <td style="font-family:var(--mono);font-weight:700;color:var(--red)">${grandTotal.toLocaleString('pt-BR')}</td>
    <td>—</td>
  </tr>`;

  document.getElementById('heatmapTable').innerHTML = html;
}

function renderErrGrid(d) {
  const totals = getTotalErrByOp(d);
  const ops = Object.keys(totals).sort((a,b)=>totals[b]-totals[a]).filter(op=>totals[op]>0);
  let html = '';
  for (const op of ops) {
    const color = OP_COLORS[op] || '#888';
    const errs = d.op_errors[op] || {};
    const total = totals[op];
    const opVolume = d.operadoras[op] || 1;
    const pctErr = ((total/opVolume)*100).toFixed(1);
    const errEntries = Object.entries(errs).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
    const maxErr = errEntries.length > 0 ? errEntries[0][1] : 1;

    html += `<div class="err-op-card">
      <div class="err-op-header" style="border-left:3px solid ${color}">
        <span class="op-dot" style="background:${color}"></span>
        <span class="err-op-name">${op}</span>
        <span class="err-op-badge">${total.toLocaleString('pt-BR')} erros · ${pctErr}%</span>
      </div>
      <div class="err-op-body">`;

    if (errEntries.length === 0) {
      html += `<div style="font-size:12px;color:var(--text3)">Sem erros registrados</div>`;
    } else {
      for (const [label, count] of errEntries) {
        const barPct = ((count / maxErr)*100).toFixed(0);
        const shortLabel = label.length > 48 ? label.slice(0,48)+'…' : label;
        html += `<div class="err-type-row">
          <span class="err-type-label" title="${label}">${shortLabel}</span>
          <div class="err-bar-bg"><div class="err-bar-fill" style="width:${barPct}%"></div></div>
          <span class="err-type-count">${count.toLocaleString('pt-BR')}</span>
        </div>`;
      }
    }
    html += `</div></div>`;
  }
  document.getElementById('errGrid').innerHTML = html;
}

// ─── CSV IMPORT ───────────────────────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', function(event) {
  const files = Array.from(event.target.files);
  files.forEach(file => {
    Papa.parse(file, {
      header: true, encoding: 'UTF-8', skipEmptyLines: true,
      complete: function(results) {
        const rows = results.data;
        if (!rows.length) return;
        const firstRow = rows[0];
        const criacao = firstRow['Criação'] || firstRow['\uFEFFCriação'] || '';
        const dayKey = criacao.slice(0,10);
        if (!dayKey) return;

        const status = {}, desc = {}, ops = {}, opStatus = {}, opErrors = {};
        let erros = 0;

        const isErrType = (s) => s && (
          s.toLowerCase().includes('error') || s.toLowerCase().includes('erro') ||
          s.toLowerCase().includes('rejected') || s.toLowerCase().includes('not covered') ||
          s.toLowerCase().includes('unavailable') || s.toLowerCase().includes('canceled')
        );

        rows.forEach(r => {
          const st = r['Status'] || '';
          const ds = r['Desc. Status'] || '';
          const op = r['Operadora'] || '';
          if (st) status[st] = (status[st]||0)+1;
          if (ds) desc[ds] = (desc[ds]||0)+1;
          if (op) {
            ops[op] = (ops[op]||0)+1;
            if (!opStatus[op]) opStatus[op] = {};
            if (st) opStatus[op][st] = (opStatus[op][st]||0)+1;
            // Acumular erros por tipo
            if ((st === 'Não recebido' || st === 'Erro interno') && ds) {
              if (!opErrors[op]) opErrors[op] = {};
              opErrors[op][ds] = (opErrors[op][ds]||0)+1;
            }
          }
          if (st === 'Não recebido' || st === 'Erro interno') erros++;
        });

        DATA[dayKey] = {
          total: rows.length, status, desc_status: desc,
          operadoras: ops, op_status: opStatus, op_errors: opErrors, erros
        };

        currentDay = dayKey;
        rebuildTabs();
        render();
      }
    });
  });
  event.target.value = '';
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
rebuildTabs();
render();
</script>
</body>
</html>
